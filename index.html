<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Mentor | Blog Preview Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <article class="card">
        <a href="#" class="card__image-link">
          <img
            class="card__image"
            src="./assets/images/illustration-article.svg"
            alt="HTML & CSS foundations illustration"
          />
        </a>

        <div class="card__body">
          <a href="#" class="card__tag">Learning</a>

          <p class="card__date">Published 21 Dec 2023</p>

          <a href="#" class="card__title-link">
            <h2 class="card__title">HTML &amp; CSS foundations</h2>
          </a>

          <p class="card__text">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>

          <div class="card__author author">
            <img
              class="author__avatar"
              src="./assets/images/image-avatar.webp"
              alt="Greg Hooper avatar"
              width="40"
              height="40"
            />
            <span class="author__name">Greg Hooper</span>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
